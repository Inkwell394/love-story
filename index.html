<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.music-bar { display: flex; align-items: flex-end; gap: 2px; height: 20px; }

.footer { text-align: center; padding: 60px 20px 30px; position: relative; z-index: 2; border-top: 1px solid rgba(255,255,255,0.05); }

<script>
// ============================================================
//  Configuration - Edit these values to customize your site
// ============================================================
const COUPLE = { her: '她', him: '他' };
const timelineData = [
  { date: '2019-09-15', title: '第一次相遇', description: '在那个阳光明媚的午后，我们的目光在人群中相遇，故事就这样开始了。' },

  { date: '2020-10-01', title: '确定关系', description: '跨年的钟声响起时，我们牵起了彼此的手，决定一起走向未来。' },
  { date: '2024-01-18', title: '第一次旅行', description: '一起去看海，踩着沙滩，追着浪花，留下了无数美好的回忆。' },
  { date: '2027-02-01', title: '见家长', description: '带着紧张和期待，走入了彼此的家庭，得到了最温暖的祝福。' },
  { date: '2025-02-14', title: '第一个情人节', description: '用心准备了惊喜，看着你惊喜的笑容，就是最大的幸福。' }
];
const galleryData = [
  { url: 'img/041ee5a4a9ba15770158951db407ca96.jpg', caption: '💕 我们的故事' },
  { url: 'img/6e91b0acd8200b703d5f4ae3b92a4cb9.jpg', caption: '🌸 最美时光' },
  { url: 'img/9da9d30ed1ddb81a0971764bc0834e6b.jpg', caption: '🌊 海边回忆' },
  { url: 'img/c400c823c237037a633643d06670d810.jpg', caption: '🎂 生日快乐' },
  { url: 'img/c8a6ae256514722a09bc86417e5fb791.jpg', caption: '🌹 约会日常' },
  { url: 'img/cc558a227737255014ab96c70379f50e.jpg', caption: '✨ 心动瞬间' },
  { url: 'img/efe7d6d630d46c8f6dadfa32cb1d38e2.jpg', caption: '🎄 圣诞快乐' },
  { url: 'img/4da34d6a3722245940a8e5100a46ada8.jpg', caption: '💑 新增美好回忆' },
];
const musicUrl = ''; // <-- Set to your music file URL
const API_BASE = '';  // ??????????????????? 'http://??IP:8000' // <-- 后端 API 地址，部署时改为服务器地址
// ============================================================
//  Code - No need to modify below
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1200);
  initNames(); initTimeline(); initGallery(); initMessages();
  initMusicPlayer(); initScrollAnim(); initMouseGlow();
  initHeartBurst(); initBackTop(); initSettings(); initParticles();
});
function initNames() {
  document.getElementById('nameHerDisplay').textContent = COUPLE.her;
  document.getElementById('nameHimDisplay').textContent = COUPLE.him;
  document.getElementById('footerNames').innerHTML = COUPLE.her + ' &amp; ' + COUPLE.him;
}
function initParticles() {
  const c = document.getElementById('heroParticles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div'); p.className = 'hero-particle';
    p.style.left = Math.random() * 100 + '%';
    const sz = Math.random() * 4 + 3; p.style.width = sz + 'px'; p.style.height = sz + 'px';
    p.style.animationDuration = (Math.random() * 8 + 6) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.opacity = Math.random() * 0.5 + 0.2; c.appendChild(p);
  }
}
function initTimeline() {
  const c = document.getElementById('timelineContainer'); c.innerHTML = '';
  timelineData.forEach((item) => {
    const el = document.createElement('div'); el.className = 'timeline-item fade-up';
    el.innerHTML = '<div class="timeline-dot"></div><div class="timeline-card">'
      + '<div class="timeline-date"><i class="far fa-calendar-alt"></i> ' + item.date + '</div>'
      + '<h3>' + item.title + '</h3><p>' + item.description + '</p></div>';
    c.appendChild(el);
  });
}
let lightIdx = 0;
function initGallery() {
  const grid = document.getElementById('galleryGrid'); grid.innerHTML = '';
  galleryData.forEach((item, i) => {
    const el = document.createElement('div'); el.className = 'gallery-item fade-up';
    el.innerHTML = '<img src="' + item.url + '" alt="' + item.caption + '" loading="lazy"><div class="gallery-overlay"><span>' + item.caption + '</span></div>';
    el.addEventListener('click', () => openLight(i)); grid.appendChild(el);
  });
}
function openLight(i) { lightIdx = i; document.getElementById('lightboxImg').src = galleryData[i].url; document.getElementById('lightboxCaption').textContent = galleryData[i].caption; document.getElementById('lightbox').classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeLight() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; }
function moveLight(d) { let i = lightIdx + d; if (i < 0) i = galleryData.length - 1; if (i >= galleryData.length) i = 0; openLight(i); }
document.getElementById('lightboxClose').addEventListener('click', closeLight);
document.getElementById('lightboxPrev').addEventListener('click', () => moveLight(-1));
document.getElementById('lightboxNext').addEventListener('click', () => moveLight(1));
document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeLight(); });
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLight();
  if (e.key === 'ArrowLeft') moveLight(-1);
  if (e.key === 'ArrowRight') moveLight(1);
});
// ===== Supabase Login =====
async function doLogin() {
  const username = document.getElementById("loginUsername").value.trim()
  const password = document.getElementById("loginPassword").value.trim()
  if (!username || !password) return
  const { error } = await supabase.auth.signInWithPassword({ email: username + "@love.local", password })
  if (error) { document.getElementById("loginError").style.display = "block"; return }
  document.getElementById("loginOverlay").classList.remove("active")
  document.getElementById("loginError").style.display = "none"
  updateLoginUI()
  loadMsgs()
}

function logout() {
  supabase.auth.signOut()
  updateLoginUI()
  loadMsgs()
}

function updateLoginUI() {
  const session = supabase.auth.getSession()
  const btn = document.getElementById("loginToggleBtn")
  const status = document.getElementById("loginStatus")
  if (session) {
    btn.textContent = "exit"
    btn.onclick = logout
    status.style.display = "inline"
    status.textContent = session.user.email?.split("@")[0] || "user"
  } else {
    btn.textContent = "login"
    btn.onclick = showLogin
    status.style.display = "none"
  }
}

// ===== Messages =====
async function initMessages() {
  updateLoginUI()
  document.getElementById("sendMessage").addEventListener("click", sendMsg)
  document.getElementById("messageInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMsg() })
  loadMsgs()
}

async function sendMsg() {
  const input = document.getElementById("messageInput")
  const text = input.value.trim()
  if (!text) return
  const session = supabase.auth.getSession()
  if (!session) { showLogin(); return }
  const nickname = session.user.email?.split("@")[0] || "user"
  await supabase.from("messages").insert({ text, username: session.user.id, nickname })
  input.value = ""
  loadMsgs()
}

async function loadMsgs() {
  const wall = document.getElementById("messagesWall")
  wall.innerHTML = "<div style=\"text-align:center;color:rgba(255,255,255,0.4);padding:30px\">loading...</div>"
  const { data: msgs } = await supabase
    .from("messages")
    .select("*, comments(*)")
    .order("created_at", { ascending: false })
  wall.innerHTML = ""
  if (!msgs || msgs.length === 0) return
  const colors = ["#ffe4e6","#fff3cd","#cce5ff","#e8daef","#d5f4e6","#fce4ec","#e8f5e9","#fff8e1"]
  const curUserId = supabase.auth.getSession()?.user?.id
  msgs.forEach((msg, i) => {
    const note = document.createElement("div")
    note.className = "message-note fade-up"
    note.style.background = colors[i % colors.length]
    let ch = ""
    if (msg.comments?.length > 0) {
      ch = "<div style=\"margin-top:12px;padding-top:10px;border-top:1px dashed rgba(0,0,0,0.1)\">"
      msg.comments.forEach(c => { ch += "<div style=\"font-size:0.8rem;color:#555;margin-bottom:4px\"><strong>" + escHtml(c.nickname) + "</strong>: " + escHtml(c.text) + "</div>" })
      ch += "</div>"
    }
    const mine = msg.username === curUserId
    note.innerHTML = "<div class=\"note-text\">" + escHtml(msg.text) + "</div>"
      + "<div class=\"note-time\" style=\"display:flex;justify-content:space-between\">"
      + "<span><i class=\"far fa-clock\"></i> " + (msg.created_at || "").slice(0,16) + " ? " + escHtml(msg.nickname) + "</span>"
      + "<span>" + (mine ? "<span class=\"note-del\" data-id=\"" + msg.id + "\" style=\"cursor:pointer;color:#e74c3c;font-size:0.75rem;margin-right:8px\"><i class=\"fas fa-trash-alt\"></i></span>" : "")
      + "<span class=\"reply-btn\" data-id=\"" + msg.id + "\" style=\"cursor:pointer;color:#888;font-size:0.75rem\"><i class=\"fas fa-reply\"></i></span>"
      + "</span></div>" + ch
      + "<div class=\"reply-box\" id=\"r" + msg.id + "\" style=\"display:none;margin-top:8px\">"
      + "<div style=\"display:flex;gap:6px\"><input class=\"ri\" placeholder=\"reply...\" style=\"flex:1;padding:6px 12px;border-radius:20px;border:1px solid rgba(0,0,0,0.1);font-size:0.8rem;outline:none;background:rgba(255,255,255,0.7)\"><button class=\"rs\" data-id=\"" + msg.id + "\" style=\"padding:6px 14px;border:none;border-radius:20px;background:#ff6b9d;color:#fff;cursor:pointer;font-size:0.8rem\">Reply</button></div></div>"
    wall.appendChild(note)
  })
  wall.querySelectorAll(".note-del").forEach(el => el.addEventListener("click", async () => { if (confirm("Delete?")) { await supabase.from("messages").delete().eq("id", el.dataset.id); loadMsgs() }}))
  wall.querySelectorAll(".reply-btn").forEach(el => el.addEventListener("click", () => { const b = document.getElementById("r" + el.dataset.id); b.style.display = b.style.display === "none" ? "block" : "none"; if (b.style.display === "block") b.querySelector(".ri").focus() }))
  wall.querySelectorAll(".rs").forEach(el => el.addEventListener("click", async () => {
    const s = supabase.auth.getSession(); if (!s) { showLogin(); return }
    const inp = document.getElementById("r" + el.dataset.id).querySelector(".ri")
    const t = inp.value.trim(); if (!t) return
    await supabase.from("comments").insert({ message_id: parseInt(el.dataset.id), text: t, username: s.user.id, nickname: s.user.email?.split("@")[0] || "user" })
    inp.value = ""; loadMsgs()
  }))
  const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible") })}, { threshold: 0.1 })
  wall.querySelectorAll(".fade-up").forEach(el => obs.observe(el))
}
// ===== Blessings =====
async function initBlessings() {
  document.getElementById("sendBlessing").addEventListener("click", sendBlessing)
  document.getElementById("blessText").addEventListener("keydown", (e) => { if (e.key === "Enter") sendBlessing() })
  loadBlessings()
}

async function sendBlessing() {
  const name = document.getElementById("blessName").value.trim()
  const text = document.getElementById("blessText").value.trim()
  if (!name) { alert("Please enter your name"); return }
  if (!text) { alert("Please enter your blessing"); return }
  await supabase.from("blessings").insert({ name, text })
  document.getElementById("blessName").value = ""
  document.getElementById("blessText").value = ""
  loadBlessings()
}

async function loadBlessings() {
  const wall = document.getElementById("blessingsWall")
  wall.innerHTML = "<div style=\"text-align:center;color:rgba(255,255,255,0.4);padding:20px\">loading...</div>"
  const { data: list } = await supabase.from("blessings").select("*").order("created_at", { ascending: false })
  wall.innerHTML = ""
  if (!list || list.length === 0) {
    wall.innerHTML = "<div style=\"text-align:center;color:rgba(255,255,255,0.3);padding:30px\">No blessings yet...</div>"
    return
  }
  const colors = ["#ffe4e6","#fff3cd","#cce5ff","#e8daef","#d5f4e6","#fce4ec","#e8f5e9","#fff8e1"]
  const icons = ["??","??","??","??","??","??","?","??"]
  list.forEach((b, i) => {
    const card = document.createElement("div")
    card.className = "message-note fade-up"
    card.style.background = colors[i % colors.length]
    card.innerHTML = "<div style=\"font-size:1.2rem;margin-bottom:4px\">" + icons[i % icons.length] + " <strong>" + escHtml(b.name) + "</strong></div>"
      + "<div class=\"note-text\">" + escHtml(b.text) + "</div>"
      + "<div class=\"note-time\"><i class=\"far fa-clock\"></i> " + (b.created_at || "").slice(0,10) + "</div>"
    wall.appendChild(card)
  })
  const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible") })}, { threshold: 0.1 })
  wall.querySelectorAll(".fade-up").forEach(el => obs.observe(el))
}
