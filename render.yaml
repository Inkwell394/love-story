services:
  - type: web
    name: love-story
    runtime: python
    buildCommand: pip install fastapi uvicorn python-jose[cryptography] passlib[bcrypt] python-multipart aiofiles python-dotenv
    startCommand: python app.py
    envVars:
      - key: LOVE_SECRET_KEY
        value: love-story-render-deploy-key-2026
      - key: LOVE_ADMIN_PWD
        value: love123456
      - key: LOVE_GIRL_PWD
        value: love123456
