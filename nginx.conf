server {
    listen 80;
    server_name _;  # ???????IP

    # ??????
    root /path/to/loveyou;
    index index.html;

    # API ????
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ????
    location /uploads/ {
        alias /path/to/loveyou/backend/uploads/;
    }

    # ????????
    location ~ \.db$ {
        deny all;
    }
    location ~ /\. {
        deny all;
    }
}
