<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💕 秘密花园 - 情侣私聊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: "Noto Serif SC", serif;
  background: url("static/images/chat-bg.jpg") center/cover no-repeat;
  color: #fff;
  display: flex;
  flex-direction: column;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 0;
}
.chat-container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.chat-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.chat-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff6b9d, #c084fc);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: #fff;
}
.chat-header-title {
  font-family: "Ma Shan Zheng", cursive;
  font-size: 1.3rem;
  color: #fff;
}
.chat-header-subtitle {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.4);
  font-family: "Dancing Script", cursive;
}
.chat-header-actions { display: flex; gap: 10px; }
.chat-header-actions button {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: all 0.3s;
  font-size: 0.9rem;
}
.chat-header-actions button:hover {
  background: rgba(255,107,157,0.2);
  color: #ff6b9d;
  border-color: #ff6b9d;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,107,157,0.3); border-radius: 2px; }
.chat-loading, .chat-empty {
  text-align: center;
  color: rgba(255,255,255,0.3);
  padding: 60px 20px;
}
.chat-empty i { font-size: 2.5rem; margin-bottom: 16px; color: rgba(255,107,157,0.3); }
.chat-bubble {
  max-width: 75%;
  padding: 14px 18px;
  border-radius: 18px;
  word-break: break-word;
}
.chat-mine {
  align-self: flex-end;
  background: linear-gradient(135deg, #ff6b9d, #c084fc);
  border-bottom-right-radius: 4px;
}
.chat-theirs {
  align-self: flex-start;
  background: rgba(255,255,255,0.08);
  border-bottom-left-radius: 4px;
}
.chat-bubble-name { font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; }
.chat-bubble-text { font-size: 0.95rem; line-height: 1.5; color: #fff; }
.chat-bubble-time { font-size: 0.65rem; opacity: 0.5; margin-top: 6px; text-align: right; }
.chat-input-area {
  display: flex;
  gap: 10px;
  padding: 14px 24px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.chat-input-area input {
  flex: 1;
  padding: 14px 20px;
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 50px;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 0.95rem;
  font-family: "Noto Serif SC", serif;
  outline: none;
  transition: all 0.3s;
}
.chat-input-area input:focus { border-color: #ff6b9d; background: rgba(255,107,157,0.05); }
.chat-input-area button {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ff6b9d, #c084fc);
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.3s;
  flex-shrink: 0;
}
.chat-input-area button:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(255,107,157,0.4); }
@media (max-width: 480px) {
  .chat-messages { padding: 14px 16px; }
  .chat-bubble { max-width: 85%; }
  .chat-header { padding: 12px 16px; }
  .chat-input-area { padding: 10px 16px; }
}
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-avatar"><i class="fas fa-heart"></i></div>
      <div>
        <div class="chat-header-title">💕 秘密花园</div>
        <div class="chat-header-subtitle" id="chatPartnerDisplay">💕 加载中...</div>
      </div>
    </div>
    <div class="chat-header-actions">
      <button onclick="refreshChat()" title="刷新"><i class="fas fa-sync-alt"></i></button>
      <button onclick="logout()" title="退出登录"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-loading" id="chatLoading"><i class="fas fa-heart"></i> 加载中...</div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="输入你想说的话..." maxlength="500" autocomplete="off">
    <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<!-- ============================================================
     新增：Supabase 认证支持
     ============================================================ -->
<script src="/static/js/supabase-auth.js"></script>
<script>
const API_BASE = "";

function getToken() { return localStorage.getItem("loveToken"); }
function saveToken(t) { localStorage.setItem("loveToken", t); }
function clearToken() { localStorage.removeItem("loveToken"); }

function getUsername() {
  try {
    var t = getToken();
    if (!t) return null;
    return JSON.parse(atob(t.split(".")[1])).sub;
  } catch(e) { return null; }
}

// Redirect to main page if not logged in
(function() {
  // ============================================================
  // 新增：Supabase 认证支持
  // ============================================================
  var token = getToken();
  var sbToken = localStorage.getItem("sb_access_token");
  if (!token && !sbToken) {
    window.location.href = "/login";
    return;
  }
  // 如果只有 Supabase token 但没有 loveToken，同步
  if (sbToken && !token) {
    localStorage.setItem("loveToken", sbToken);
  }
  var user = getUsername();
  if (!token && !sbToken) {
    window.location.href = "/login";
    return;
  }
})();

async function api(url, method, body, auth) {
  var opts = { method: method, headers: {} };
  if (body) { opts.body = JSON.stringify(body); opts.headers["Content-Type"] = "application/json"; }
  if (auth !== false) {
    var t = getToken();
    if (t) opts.headers["Authorization"] = "Bearer " + t;
  }
  var r = await fetch(API_BASE + url, opts);
  if (!r.ok) {
    var e = await r.json().catch(function() { return {detail: r.statusText}; });
    throw new Error(e.detail || "Request failed");
  }
  return r.json();
}

function escHtml(str) {
  var div = document.createElement("div");
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

async function loadChat() {
  var wall = document.getElementById("chatMessages");
  var loading = document.getElementById("chatLoading");
  if (loading) loading.style.display = "block";
  try {
    var msgs = await api("/api/chat/messages", "GET", null, true);
    if (loading) loading.style.display = "none";
    wall.innerHTML = "";
    if (!msgs || msgs.length === 0) {
      wall.innerHTML = '<div class="chat-empty"><i class="far fa-comment-dots"></i><br>开始你们的第一次对话吧 💕</div>';
      return;
    }
    var curUser = getUsername();
    var myNick = curUser === "admin" ? "我" : "她";
    var partnerNick = curUser === "admin" ? "她" : "我";
    document.getElementById("chatPartnerDisplay").textContent = "💕 " + partnerNick;
    msgs.forEach(function(msg) {
      var isMe = msg.sender === curUser;
      var bubble = document.createElement("div");
      bubble.className = "chat-bubble" + (isMe ? " chat-mine" : " chat-theirs");
      var sn = isMe ? myNick : partnerNick;
      bubble.innerHTML = '<div class="chat-bubble-name">' + sn + '</div><div class="chat-bubble-text">' + escHtml(msg.text) + '</div><div class="chat-bubble-time">' + (msg.created_at || "").slice(5,16) + '</div>';
      wall.appendChild(bubble);
    });
    wall.scrollTop = wall.scrollHeight;
  } catch(e) {
    if (loading) loading.style.display = "none";
    wall.innerHTML = '<div class="chat-loading" style="color:#ff6b9d">无法加载聊天: ' + escHtml(e.message) + '</div>';
  }
}

async function sendChat() {
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if (!text) return;
  if (!getToken()) { window.location.href = "/"; return; }
  input.disabled = true;
  try {
    await api("/api/chat/messages", "POST", {text: text}, true);
    input.value = "";
    loadChat();
  } catch(e) {
    alert("发送失败 " + e.message);
  }
  input.disabled = false;
  input.focus();
}

function refreshChat() { loadChat(); }

function logout() {
  clearToken();
  window.location.href = "/";
}

// Auto-load on page load
document.addEventListener("DOMContentLoaded", function() {
  loadChat();
  var inp = document.getElementById("chatInput");
  if (inp) {
    inp.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });
  }
  // Auto-refresh every 10 seconds
  setInterval(loadChat, 10000);
});
</script>
</body>
</html>
