锘?!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 登录 - 我们的故事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: "Noto Serif SC", serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}
/* 鑳屾櫙绮掑瓙 */
.particles { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.particle {
  position: absolute; width: 6px; height: 6px;
  background: rgba(255,107,157,0.3); border-radius: 50%;
  animation: float linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}
/* 涓诲崱鐗?*/
.auth-container {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px; padding: 20px;
}
.auth-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 40px 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.auth-icon {
  width: 64px; height: 64px; margin: 0 auto 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff6b9d, #c084fc);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; color: #fff;
  box-shadow: 0 8px 30px rgba(255,107,157,0.3);
}
.auth-title {
  font-family: "Ma Shan Zheng", cursive;
  text-align: center; font-size: 2rem; margin-bottom: 4px;
  background: linear-gradient(135deg, #ff6b9d, #c084fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.auth-subtitle {
  text-align: center; font-size: 0.85rem;
  color: rgba(255,255,255,0.4); margin-bottom: 28px;
}
.auth-divider {
  display: flex; align-items: center; gap: 16px;
  color: rgba(255,255,255,0.2); font-size: 0.8rem; margin: 20px 0;
}
.auth-divider::before, .auth-divider::after {
  content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
}
/* 琛ㄥ崟椤?*/
.input-group { position: relative; margin-bottom: 16px; }
.input-group i {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,0.3); font-size: 1rem; transition: color 0.3s;
}
.input-group input {
  width: 100%; padding: 14px 16px 14px 46px;
  border: 2px solid rgba(255,255,255,0.08); border-radius: 12px;
  background: rgba(255,255,255,0.05); color: #fff;
  font-size: 0.95rem; font-family: "Noto Serif SC", serif;
  outline: none; transition: all 0.3s;
}
.input-group input:focus { border-color: #ff6b9d; background: rgba(255,107,157,0.05); }
.input-group input:focus ~ i { color: #ff6b9d; }
.input-group input::placeholder { color: rgba(255,255,255,0.25); }
/* 鎸夐挳 */
.auth-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-family: "Noto Serif SC", serif;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: all 0.3s; letter-spacing: 1px; margin-top: 8px;
  background: linear-gradient(135deg, #ff6b9d, #c084fc);
  color: #fff; position: relative; overflow: hidden;
}
.auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,157,0.4); }
.auth-btn:active { transform: translateY(-1px); }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.auth-btn .spinner {
  display: none; width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.6s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.auth-btn.loading .btn-text { display: none; }
.auth-btn.loading .spinner { display: inline-block; }
/* 閾炬帴 */
.auth-links { text-align: center; margin-top: 20px; }
.auth-links a {
  color: rgba(255,255,255,0.45); text-decoration: none;
  font-size: 0.85rem; transition: color 0.3s; display: inline-block; margin: 4px 0;
}
.auth-links a:hover { color: #ff6b9d; }
.auth-links .link-divider { color: rgba(255,255,255,0.15); margin: 0 8px; }
/* 閿欒鎻愮ず */
.auth-error {
  background: rgba(255,107,157,0.1);
  border: 1px solid rgba(255,107,157,0.2);
  border-radius: 10px; padding: 10px 14px;
  font-size: 0.85rem; color: #ff6b9d; margin-bottom: 16px;
  display: none; text-align: center;
}
.auth-error.show { display: block; }
/* 鎴愬姛鎻愮ず */
.auth-success {
  background: rgba(72,187,120,0.1);
  border: 1px solid rgba(72,187,120,0.2);
  border-radius: 10px; padding: 10px 14px;
  font-size: 0.85rem; color: #48bb78; margin-bottom: 16px;
  display: none; text-align: center;
}
.auth-success.show { display: block; }
/* 返回棣栭〉 */
.back-home {
  text-align: center; margin-top: 16px;
}
.back-home a {
  color: rgba(255,255,255,0.3); text-decoration: none;
  font-size: 0.8rem; transition: color 0.3s;
}
.back-home a:hover { color: #ff6b9d; }
/* 密码鍙鍒囨崲 */
.toggle-pwd {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: rgba(255,255,255,0.25);
  cursor: pointer; font-size: 0.9rem; padding: 4px;
}
.toggle-pwd:hover { color: rgba(255,255,255,0.5); }
@media (max-width: 480px) {
  .auth-card { padding: 28px 20px; }
}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-icon"><i class="fas fa-heart"></i></div>
    <h1 class="auth-title">娆㈣繋鍥炴潵</h1>
    <p class="auth-subtitle">输入浣犱滑鐨勪笓灞為偖绠辫繘鍏ョ瀵嗙┖闂?/p>

    <!-- 閿欒鎻愮ず -->
    <div class="auth-error" id="authError"></div>

    <!-- Supabase 閭欢登录 -->
    <form id="loginForm" onsubmit="return false;">
      <div class="input-group">
        <input type="email" id="loginEmail" placeholder="閭鍦板潃" autocomplete="email" required>
        <i class="fas fa-envelope"></i>
      </div>
      <div class="input-group">
        <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password" required>
        <i class="fas fa-lock"></i>
        <button type="button" class="toggle-pwd" onclick="togglePassword('loginPassword', this)" tabindex="-1">
          <i class="far fa-eye"></i>
        </button>
      </div>
      <button type="submit" class="auth-btn" id="loginBtn" onclick="handleLogin(event)">
        <span class="btn-text"><i class="fas fa-key"></i> 登录</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="auth-divider">鎴栬€呬娇鐢ㄥ瘑鐮佺櫥褰?/div>

    <!-- 原有系统登录 -->
    <form id="legacyLoginForm" onsubmit="return false;">
      <div class="input-group">
        <input type="text" id="legacyUsername" placeholder="用户名? autocomplete="username">
        <i class="fas fa-user"></i>
      </div>
      <div class="input-group">
        <input type="password" id="legacyPassword" placeholder="密码" autocomplete="off">
        <i class="fas fa-lock"></i>
        <button type="button" class="toggle-pwd" onclick="togglePassword('legacyPassword', this)" tabindex="-1">
          <i class="far fa-eye"></i>
        </button>
      </div>
      <button type="submit" class="auth-btn" id="legacyLoginBtn" onclick="handleLegacyLogin(event)">
        <span class="btn-text"><i class="fas fa-key"></i> 密码登录</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="auth-links">
      <a href="/register"><i class="far fa-user"></i> 注册璐﹀彿</a>
      <span class="link-divider">|</span>
      <a href="/forgot-password"><i class="far fa-question-circle"></i> 蹇樿密码</a>
    </div>
    <div class="back-home">
      <a href="/"><i class="fas fa-arrow-left"></i> 返回棣栭〉</a>
    </div>
  </div>
</div>

<script src="/static/js/supabase-auth.js"></script>
<script>
// 页面专用脚本

// 生成背景粒子
(function() {
  var container = document.getElementById("particles");
  for (var i = 0; i < 30; i++) {
    var p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDuration = (10 + Math.random() * 20) + "s";
    p.style.animationDelay = (Math.random() * 20) + "s";
    p.style.width = p.style.height = (3 + Math.random() * 6) + "px";
    container.appendChild(p);
  }
})();

// 密码鍙鍒囨崲
function togglePassword(inputId, btn) {
  var input = document.getElementById(inputId);
  var icon = btn.querySelector("i");
  if (input.type === "password") {
    input.type = "text";
    icon.className = "far fa-eye-slash";
  } else {
    input.type = "password";
    icon.className = "far fa-eye";
  }
}

// 设置按钮加载鐘舵€?
function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (loading) {
    btn.classList.add("loading");
    btn.disabled = true;
  } else {
    btn.classList.remove("loading");
    btn.disabled = false;
  }
}

// 显示错误
function showError(msg) {
  var el = document.getElementById("authError");
  el.textContent = msg;
  el.classList.add("show");
}

function hideError() {
  document.getElementById("authError").classList.remove("show");
}

// 登录锛堜娇鐢ㄥ悗绔?API锛?
async function handleLogin(e) {
  e.preventDefault();
  hideError();
  var email = document.getElementById("loginEmail").value.trim();
  var password = document.getElementById("loginPassword").value.trim();
  if (!email || !password) { showError("璇峰～鍐欓偖绠卞拰密码"); return; }

  // 灏嗛偖绠?@ 鍓嶉潰閮ㄥ垎浣滀负用户名?
  var username = email.split("@")[0];

  setLoading("loginBtn", true);
  try {
    var r = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password })
    });
    if (!r.ok) {
      var errData = await r.json().catch(function() { return { detail: "登录澶辫触" }; });
      showError(errData.detail || "閭鎴栧瘑鐮侀敊璇?);
      setLoading("loginBtn", false);
      return;
    }
    var data = await r.json();
    if (window.saveToken) {
      window.saveToken(data.access_token);
    } else {
      localStorage.setItem("loveToken", data.access_token);
    }
    if (data.user) {
      localStorage.setItem("loveUser", JSON.stringify(data.user));
    }
    window.location.href = "/chat";
  } catch (err) {
    console.error("登录澶辫触:", err);
    showError("网络閿欒: " + (err.message || "璇锋鏌ョ綉缁滆繛鎺?));
    setLoading("loginBtn", false);
  }
}

// 原有系统登录
async function handleLegacyLogin(e) {
  e.preventDefault();
  hideError();
  var username = document.getElementById("legacyUsername").value.trim();
  var password = document.getElementById("legacyPassword").value.trim();
  if (!username || !password) { showError("璇峰～鍐欑敤鎴峰悕鍜屽瘑鐮?); return; }

  setLoading("legacyLoginBtn", true);
  try {
    var r = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password })
    });
    if (!r.ok) {
      var errData = await r.json().catch(function() { return { detail: "登录澶辫触" }; });
      showError(errData.detail || "用户名嶆垨密码閿欒");
      setLoading("legacyLoginBtn", false);
      return;
    }
    var data = await r.json();
    // 使用原有 token 存储
    // 注意：需要在 index.html 中已有 saveToken 函数
    if (window.saveToken) {
      window.saveToken(data.access_token);
    } else {
      localStorage.setItem("loveToken", data.access_token);
    }
    if (data.user) {
      localStorage.setItem("loveUser", JSON.stringify(data.user));
    }
    // 跳转到私密聊天页
    window.location.href = "/chat";
  } catch (err) {
    showError("网络閿欒: " + (err.message || "璇锋鏌ョ綉缁滆繛鎺?));
    setLoading("legacyLoginBtn", false);
  }
}

// 检查是否已登录锛圫upabase锛?
try {
  SupabaseAuth.onAuthStateChange(function(state) {
    if (state.isAuthenticated && !state.isLoading) {
      window.location.href = "/chat";
    }
  });
} catch(e) {
  console.warn("Supabase not available:", e);
}</script>
</body>
</html>
